name: voxmail

# VoxMail service stack.
#
# Runs on the shared Hetzner host (ssh alias: nexamail).
# - Redis: VoxMail has its OWN redis container (voxmail-redis) on the voxmail_default
#   network, reached by service name (REDIS_URL=redis://voxmail-redis:6379/0). NOT the
#   shared host redis (which has 6+ other consumers and no auth).
# - Postgres: STAYS on the host (data lives there) via host.docker.internal. Because the
#   bridges run on voxmail_default but host PG listens on docker0 (172.17.0.1), the imap/ai
#   containers are ALSO attached to the docker0 "bridge" network. Compose can't attach to the
#   default bridge (alias limitation), so that join is imperative + held by a systemd unit
#   (voxmail-docker0-join.service). >>> AFTER ANY `docker compose up -d` RECREATE, RUN:
#   `systemctl start voxmail-docker0-join.service` to re-attach docker0 for host-Postgres. <<<
#
# Ports are bound to 127.0.0.1 only. Public access goes through the host nginx.

services:
  voxmail-redis:
    image: redis:7-alpine
    container_name: voxmail-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    # internal-only: no host port published; reachable by the bridges via voxmail_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  imap-bridge:
    build:
      context: ../services/imap-bridge
    image: voxmail/imap-bridge:0.1.0
    container_name: voxmail-imap
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:4001:4001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-bridge:
    build:
      context: ../services/ai-bridge
    image: voxmail/ai-bridge:0.1.0
    container_name: voxmail-ai
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:4002:4002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only access to the sibling tamiltts-saas project for its
      # TamilTextProcessor pipeline (see voice.py). Falls back to pass-through
      # if the mount isn't present (local dev).
      - /opt/tamiltts-saas:/mnt/tamiltts-saas:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4002/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
